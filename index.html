<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Bardwan | Admin Enterprise</title>
    
    <!-- Professional Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            color: #1e293b;
            margin: 0;
        }
        
        .sidebar-transition { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Smooth Iframe Container */
        .content-wrapper {
            height: calc(100vh - 64px);
            margin-top: 64px;
        }

        .iframe-container {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* Custom Scrollbar for Sidebar */
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* Loading Animation */
        .loader-line {
            height: 3px;
            width: 100%;
            background: #e2e8f0;
            position: relative;
            overflow: hidden;
        }
        .loader-progress {
            position: absolute;
            height: 100%;
            background: #3b82f6;
            animation: loading 2s infinite ease-in-out;
        }
        @keyframes loading {
            0% { left: -100%; width: 30%; }
            50% { width: 60%; }
            100% { left: 100%; width: 30%; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURATION ---
        const ACCENT_THEMES = [
            { name: 'Blue', primary: '#2563eb', bg: '#eff6ff', text: '#1e40af' },
            { name: 'Emerald', primary: '#059669', bg: '#ecfdf5', text: '#065f46' },
            { name: 'Indigo', primary: '#4f46e5', bg: '#eef2ff', text: '#3730a3' },
            { name: 'Violet', primary: '#7c3aed', bg: '#f5f3ff', text: '#5b21b6' },
            { name: 'Rose', primary: '#e11d48', bg: '#fff1f2', text: '#9f1239' },
            { name: 'Slate', primary: '#334155', bg: '#f1f5f9', text: '#0f172a' },
        ];

        const MENU_ITEMS = [
            { id: 1, name: "Check List", icon: "check-square", link: "https://check-list-one-ochre.vercel.app/" },
            { id: 2, name: "Farmacy Voice", icon: "mic", link: "https://script.google.com/macros/s/AKfycbw_AdxUZs140zqw75jaL0qihFBHIhxr0_LyL08MhlNqYWwPcoYTxAjVbvj3UQxsAI5X/exec" },
            { id: 3, name: "Price Comparison", icon: "trending-up", link: "https://script.google.com/macros/s/AKfycbwUhmnmSJj8cu69x3YH8EvSWz7y_S_23NCt31Sl7zbOcIf0qnmjBFRe1vkgr2guc9GYHQ/exec" },
            { id: 4, name: "Attendance Dashboard", icon: "calendar-check", link: "https://script.google.com/macros/s/AKfycbx1NFtN6E_PWl1QRQIu35Rv7rAaoahFyb4RSX9wRLtI8aZnt0dPASMSeEpI7GlxS9jiIQ/exec" },
            { id: 5, name: "Order Management", icon: "shopping-cart", link: "https://script.google.com/macros/s/AKfycbxwCNFiPJHBSih_l6o8BOVWsFgdQ5-a1XbyUt9yjmxOnTuoJFxwY7ZuqLr519IhEzCi1A/exec" },
            { id: 6, name: "Task Delegation", icon: "user-check", link: "https://script.google.com/macros/s/AKfycbzUjEFdb7RMvW6dw6gUUG4naSDsd6xuLxuCtcCKmJBoiM_488IF7lkoC7JH_-jAc1m3Tg/exec" },
            { id: 7, name: "Employee Master", icon: "users", link: "https://script.google.com/macros/s/AKfycbzKx9StAI33YxhFQOsDxfZhu048M0L8n6JtwmOlEb4dBBJiSlULp-Fe6C3V3eyDHfMJqA/exec" },
            { id: 8, name: "Daily Work MIS", icon: "bar-chart-2", link: "https://script.google.com/macros/s/AKfycbzPenTggHP53wmfQ342QvzwwNR_tdUW4FNiP9MvoYrkvc2zpr8bLG0W6UiQtvIgEwB4/exec" },
        ];

        const App = () => {
            const [isSidebarOpen, setSidebarOpen] = useState(true);
            const [activeTheme, setActiveTheme] = useState(ACCENT_THEMES[0]);
            const [currentUrl, setCurrentUrl] = useState(MENU_ITEMS[0].link);
            const [activeId, setActiveId] = useState(MENU_ITEMS[0].id);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                lucide.createIcons();
            }, [isSidebarOpen, activeTheme, currentUrl, activeId]);

            const handleNav = (item) => {
                setLoading(true);
                setActiveId(item.id);
                setCurrentUrl(item.link);
            };

            return (
                <div className="flex h-screen w-full overflow-hidden bg-slate-50">
                    
                    {/* SIDEBAR */}
                    <aside className={`sidebar-transition bg-white border-r border-slate-200 flex flex-col z-50
                        ${isSidebarOpen ? 'w-64' : 'w-20'}`}>
                        
                        {/* BRANDING */}
                        <div className="h-16 flex items-center px-6 border-b border-slate-100 shrink-0">
                            <div className="w-8 h-8 rounded-lg flex items-center justify-center text-white shrink-0 shadow-sm" 
                                 style={{ backgroundColor: activeTheme.primary }}>
                                <i data-lucide="pill" className="w-5 h-5"></i>
                            </div>
                            {isSidebarOpen && (
                                <span className="ml-3 font-bold text-slate-800 text-sm tracking-tight whitespace-nowrap">
                                    Medicine <span style={{ color: activeTheme.primary }}>Bardwan</span>
                                </span>
                            )}
                        </div>

                        {/* NAVIGATION */}
                        <nav className="flex-1 py-4 px-3 space-y-1 overflow-y-auto no-scrollbar">
                            {MENU_ITEMS.map((item) => {
                                const isActive = activeId === item.id;
                                return (
                                    <button
                                        key={item.id}
                                        onClick={() => handleNav(item)}
                                        className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 group
                                        ${isSidebarOpen ? 'justify-start' : 'justify-center'}
                                        ${isActive ? 'font-semibold shadow-sm' : 'text-slate-500 hover:bg-slate-50 hover:text-slate-900'}`}
                                        style={isActive ? { 
                                            backgroundColor: activeTheme.bg, 
                                            color: activeTheme.text 
                                        } : {}}
                                    >
                                        <i data-lucide={item.icon} className={`w-5 h-5 shrink-0 ${isActive ? 'text-current' : 'text-slate-400 group-hover:text-slate-600'}`}></i>
                                        {isSidebarOpen && <span className="text-sm whitespace-nowrap">{item.name}</span>}
                                        
                                        {!isSidebarOpen && (
                                            <div className="fixed left-20 bg-slate-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity z-50">
                                                {item.name}
                                            </div>
                                        )}
                                    </button>
                                );
                            })}
                        </nav>

                        {/* SIDEBAR FOOTER */}
                        <div className="p-4 border-t border-slate-100">
                            <button 
                                onClick={() => setSidebarOpen(!isSidebarOpen)}
                                className="w-full flex items-center justify-center p-2 rounded-md hover:bg-slate-100 text-slate-400 transition-colors"
                            >
                                <i data-lucide={isSidebarOpen ? "chevron-left" : "menu"} className="w-5 h-5"></i>
                            </button>
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    <div className="flex-1 flex flex-col min-w-0">
                        
                        {/* HEADER (TOP NAV) */}
                        <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shrink-0">
                            <div className="flex items-center gap-4">
                                <div className="text-sm font-medium text-slate-500">
                                    Modules <span className="mx-2 text-slate-300">/</span>
                                    <span className="text-slate-900 font-semibold">{MENU_ITEMS.find(m => m.id === activeId)?.name}</span>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-6">
                                {/* Professional Theme Selector */}
                                <div className="flex items-center gap-1.5 bg-slate-100 p-1 rounded-lg border border-slate-200">
                                    {ACCENT_THEMES.map((t) => (
                                        <button
                                            key={t.name}
                                            onClick={() => setActiveTheme(t)}
                                            className="w-5 h-5 rounded-full border-2 transition-all transform hover:scale-110"
                                            style={{ 
                                                backgroundColor: t.primary,
                                                borderColor: activeTheme.name === t.name ? '#ffffff' : 'transparent',
                                                boxShadow: activeTheme.name === t.name ? '0 0 0 1px #e2e8f0' : 'none'
                                            }}
                                            title={t.name}
                                        />
                                    ))}
                                </div>

                                <div className="flex items-center gap-3 pl-6 border-l border-slate-200">
                                    <div className="text-right hidden sm:block">
                                        <p className="text-xs font-bold text-slate-800 leading-none">Admin User</p>
                                        <p className="text-[10px] text-emerald-600 font-medium mt-1">● System Online</p>
                                    </div>
                                    <div className="w-8 h-8 rounded-full bg-slate-200 border border-slate-300 overflow-hidden shadow-sm">
                                        <img src="https://ui-avatars.com/api/?name=Admin&background=random" alt="avatar" />
                                    </div>
                                </div>
                            </div>
                        </header>

                        {/* IFRAME VIEWPORT */}
                        <main className="relative flex-1 bg-slate-50 overflow-hidden">
                            {loading && (
                                <div className="absolute inset-0 z-[100] bg-white flex flex-col items-center justify-center">
                                    <div className="w-48">
                                        <div className="loader-line">
                                            <div className="loader-progress" style={{ backgroundColor: activeTheme.primary }}></div>
                                        </div>
                                    </div>
                                    <p className="mt-4 text-xs font-bold text-slate-400 uppercase tracking-[0.2em]">Loading Module</p>
                                </div>
                            )}
                            
                            {/* Dashboard Card Container */}
                            <div className="p-4 h-full w-full">
                                <div className="w-full h-full bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                    <iframe 
                                        src={currentUrl} 
                                        className="iframe-container"
                                        onLoad={() => setLoading(false)}
                                    ></iframe>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
