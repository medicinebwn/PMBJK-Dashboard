<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Bardwan | Admin Enterprise</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
            overflow: hidden;
        }
        
        .luxury-font { font-family: 'Montserrat', sans-serif; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        /* Smooth Theme Transition */
        .theme-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Professional Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Loading Animation */
        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top: 3px solid currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .fullscreen-iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 9999;
        }

        .close-btn {
            background: #ef4444;
            transition: all 0.2s;
        }
        .close-btn:hover { transform: scale(1.1); background: #dc2626; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 7 PROFESSIONAL COLOR THEMES ---
        const ACCENT_THEMES = [
            { name: 'Royal Purple', primary: '#7c3aed', secondary: '#a78bfa', bg: '#f5f3ff', text: '#5b21b6' },
            { name: 'Emerald', primary: '#059669', secondary: '#34d399', bg: '#ecfdf5', text: '#065f46' },
            { name: 'Sapphire', primary: '#2563eb', secondary: '#60a5fa', bg: '#eff6ff', text: '#1e40af' },
            { name: 'Rose', primary: '#e11d48', secondary: '#fb7185', bg: '#fff1f2', text: '#9f1239' },
            { name: 'Sky Blue', primary: '#0ea5e9', secondary: '#7dd3fc', bg: '#f0f9ff', text: '#0369a1' },
            { name: 'Amber', primary: '#d97706', secondary: '#fbbf24', bg: '#fffbeb', text: '#92400e' },
            { name: 'Slate', primary: '#334155', secondary: '#94a3b8', bg: '#f8fafc', text: '#0f172a' },
        ];

        const MENU_ITEMS = [
            { id: 1, name: "Check List", icon: "check-square", link: "https://check-list-one-ochre.vercel.app/" },
            { id: 2, name: "Farmacy Voice", icon: "mic", link: "https://script.google.com/macros/s/AKfycbw_AdxUZs140zqw75jaL0qihFBHIhxr0_LyL08MhlNqYWwPcoYTxAjVbvj3UQxsAI5X/exec" },
            { id: 3, name: "Price Comparison", icon: "trending-up", link: "https://script.google.com/macros/s/AKfycbwUhmnmSJj8cu69x3YH8EvSWz7y_S_23NCt31Sl7zbOcIf0qnmjBFRe1vkgr2guc9GYHQ/exec" },
            { id: 4, name: "Attendance", icon: "calendar-check", link: "https://script.google.com/macros/s/AKfycbx1NFtN6E_PWl1QRQIu35Rv7rAaoahFyb4RSX9wRLtI8aZnt0dPASMSeEpI7GlxS9jiIQ/exec" },
            { id: 5, name: "Order Mgmt", icon: "shopping-cart", link: "https://script.google.com/macros/s/AKfycbxwCNFiPJHBSih_l6o8BOVWsFgdQ5-a1XbyUt9yjmxOnTuoJFxwY7ZuqLr519IhEzCi1A/exec" },
            { id: 6, name: "Delegation", icon: "user-check", link: "https://script.google.com/macros/s/AKfycbzUjEFdb7RMvW6dw6gUUG4naSDsd6xuLxuCtcCKmJBoiM_488IF7lkoC7JH_-jAc1m3Tg/exec" },
            { id: 7, name: "Employee Master", icon: "users", link: "https://script.google.com/macros/s/AKfycbzKx9StAI33YxhFQOsDxfZhu048M0L8n6JtwmOlEb4dBBJiSlULp-Fe6C3V3eyDHfMJqA/exec" },
            { id: 8, name: "Daily MIS", icon: "bar-chart-2", link: "https://script.google.com/macros/s/AKfycbzPenTggHP53wmfQ342QvzwwNR_tdUW4FNiP9MvoYrkvc2zpr8bLG0W6UiQtvIgEwB4/exec" },
        ];

        const App = () => {
            const [activeTheme, setActiveTheme] = useState(ACCENT_THEMES[2]); // Default Sapphire
            const [currentUrl, setCurrentUrl] = useState(null);
            const [activeId, setActiveId] = useState(null);
            const [loading, setLoading] = useState(false);
            const [isFullscreen, setIsFullscreen] = useState(false);

            useEffect(() => {
                lucide.createIcons();
            }, [activeTheme, currentUrl, activeId, isFullscreen]);

            const handleNav = (item) => {
                setLoading(true);
                setActiveId(item.id);
                setCurrentUrl(item.link);
                setIsFullscreen(true);
            };

            const handleClose = () => {
                setIsFullscreen(false);
                setCurrentUrl(null);
                setActiveId(null);
                setLoading(false);
            };

            return (
                <div className="flex flex-col h-screen w-full bg-slate-50">
                    
                    {/* COMPACT HEADER */}
                    <header className="h-16 glass-card border-b border-slate-200 flex items-center justify-between px-8 shrink-0 shadow-sm z-40">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 rounded-lg flex items-center justify-center text-white shadow-md theme-transition" 
                                 style={{ background: `linear-gradient(135deg, ${activeTheme.primary} 0%, ${activeTheme.secondary} 100%)` }}>
                                <i data-lucide="pill" className="w-5 h-5"></i>
                            </div>
                            <div>
                                <h1 className="luxury-font font-bold text-slate-800 text-lg leading-none">
                                    Medicine <span className="theme-transition" style={{ color: activeTheme.primary }}>Bardwan</span>
                                </h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">Enterprise Suite</p>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-6">
                            {/* Theme Switcher (Compact) */}
                            <div className="flex items-center gap-2 bg-slate-100 p-1.5 rounded-xl border border-slate-200">
                                {ACCENT_THEMES.map((t) => (
                                    <button
                                        key={t.name}
                                        onClick={() => setActiveTheme(t)}
                                        className="w-5 h-5 rounded-full transition-all transform hover:scale-125 relative"
                                        style={{ 
                                            background: `linear-gradient(135deg, ${t.primary} 0%, ${t.secondary} 100%)`,
                                            boxShadow: activeTheme.name === t.name ? `0 0 0 2px white, 0 0 0 4px ${t.primary}` : 'none'
                                        }}
                                    />
                                ))}
                            </div>

                            <div className="h-8 w-[1px] bg-slate-200 mx-2"></div>

                            <div className="flex items-center gap-3">
                                <div className="text-right hidden sm:block">
                                    <p className="text-xs font-bold text-slate-700">Administrator</p>
                                    <p className="text-[10px] text-emerald-500 font-medium">● System Active</p>
                                </div>
                                <div className="w-9 h-9 rounded-lg border border-slate-200 overflow-hidden shadow-sm">
                                    <img src="https://ui-avatars.com/api/?name=Admin&background=667eea&color=fff" alt="profile" />
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* DASHBOARD CONTENT */}
                    <main className="flex-1 overflow-y-auto custom-scrollbar p-8">
                        <div className="max-w-6xl mx-auto">
                            
                            {/* WELCOME SECTION (Compact) */}
                            <div className="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
                                <div>
                                    <h2 className="text-2xl font-bold text-slate-800">Dashboard Overview</h2>
                                    <p className="text-slate-500 text-sm">Welcome back, select a module to manage your operations.</p>
                                </div>
                                <div className="px-4 py-1.5 rounded-full text-[11px] font-bold uppercase tracking-wider bg-white border border-slate-200 text-slate-500 shadow-sm">
                                    v2.0.4 Stable
                                </div>
                            </div>

                            {/* GRID (Standard Professional Spacing) */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
                                {MENU_ITEMS.map((item) => (
                                    <div
                                        key={item.id}
                                        onClick={() => handleNav(item)}
                                        className="group glass-card rounded-2xl p-5 cursor-pointer hover:shadow-xl hover:-translate-y-1 transition-all duration-300 border border-slate-200"
                                    >
                                        <div className="w-12 h-12 rounded-xl flex items-center justify-center mb-4 theme-transition group-hover:scale-110 shadow-sm"
                                             style={{ background: `linear-gradient(135deg, ${activeTheme.primary} 0%, ${activeTheme.secondary} 100%)` }}>
                                            <i data-lucide={item.icon} className="w-6 h-6 text-white"></i>
                                        </div>
                                        <h3 className="font-bold text-slate-800 text-md mb-1 group-hover:text-black">{item.name}</h3>
                                        <p className="text-slate-400 text-xs">Module Access</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>

                    {/* FULLSCREEN MODULE VIEW */}
                    {isFullscreen && (
                        <div className="fixed inset-0 z-[10000] bg-white">
                            {loading && (
                                <div className="absolute inset-0 z-[10001] flex flex-col items-center justify-center bg-white">
                                    <div className="loader mb-4" style={{ color: activeTheme.primary }}></div>
                                    <p className="text-sm font-bold tracking-widest text-slate-400 uppercase">
                                        Loading {MENU_ITEMS.find(m => m.id === activeId)?.name}
                                    </p>
                                </div>
                            )}

                            <iframe 
                                src={currentUrl} 
                                className="fullscreen-iframe"
                                onLoad={() => setLoading(false)}
                            ></iframe>

                            <button
                                onClick={handleClose}
                                className="close-btn fixed top-5 right-5 z-[10002] w-12 h-12 rounded-full flex items-center justify-center text-white shadow-lg"
                            >
                                <i data-lucide="x" className="w-6 h-6"></i>
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
